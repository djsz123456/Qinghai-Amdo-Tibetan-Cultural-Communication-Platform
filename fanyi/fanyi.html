<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏汉翻译 - 雪域安多·藏韵传承</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary: #9B2B25;
            --primary-dark: #7a2020;
            --primary-light: rgba(155, 43, 37, 0.1);
            --gold: #D4AF37;
            --bg: #FAF9F7;
            --white: #fff;
            --border: #e8e0d8;
            --text: #2C3E50;
            --text-sub: #7f8c9a;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif; }

        body { background: var(--bg); color: var(--text); }

        /* 顶部导航 */
        .topbar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            height: 56px;
            gap: 12px;
        }
        .topbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; }
        .topbar a:hover { color: #fff; }
        .topbar .sep { color: rgba(255,255,255,0.4); }
        .topbar .logo { font-size: 18px; font-weight: 700; color: #fff; margin-right: auto; letter-spacing: 1px; }

        /* 页头 */
        .page-header {
            background: linear-gradient(135deg, var(--primary) 0%, #c0392b 100%);
            color: #fff;
            text-align: center;
            padding: 48px 20px 40px;
        }
        .page-header h1 { font-size: 30px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .page-header p { font-size: 15px; opacity: 0.85; margin-bottom: 20px; }
        .page-header .badge {
            display: inline-block;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 13px;
        }
        .page-header .badge i { margin-right: 6px; color: var(--gold); }

        /* 主体 */
        .main { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

        /* 语言方向选择器 */
        .direction-bar {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .direction-bar label { font-size: 14px; color: var(--text-sub); font-weight: 500; }
        .btn-dir {
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-dir.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }
        .btn-dir:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
        .btn-swap {
            margin-left: auto;
            background: var(--primary-light);
            border: none;
            color: var(--primary);
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .btn-swap:hover { background: rgba(155,43,37,0.18); }

        /* 翻译卡片 */
        .translate-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
        }

        .panel-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            align-items: stretch;
        }

        .panel { display: flex; flex-direction: column; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .lang-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .char-count { font-size: 12px; color: var(--text-sub); }

        .text-area {
            width: 100%;
            min-height: 180px;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.7;
            resize: vertical;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.2s;
        }
        .text-area:focus { outline: none; border-color: var(--primary); }
        .text-area.output {
            background: var(--bg);
            color: var(--text);
        }
        .text-area.tibetan { font-size: 18px; line-height: 2; }

        .divider-col {
            width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .arrow-icon { color: var(--text-sub); font-size: 20px; }

        .panel-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 8px;
            gap: 8px;
            min-height: 32px;
        }
        .action-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-sub);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* 翻译按钮 */
        .translate-btn-wrap { text-align: center; margin: 24px 0 0; }
        .translate-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 13px 48px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        .translate-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .translate-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* 状态提示 */
        .status-bar {
            text-align: center;
            font-size: 13px;
            padding: 6px 0;
            min-height: 28px;
            color: var(--text-sub);
        }
        .status-bar.error { color: #c0392b; }
        .status-bar.success { color: #27ae60; }

        /* API配置提示 */
        .api-notice {
            background: #fffbeb;
            border: 1px solid #f6d860;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #7d5a00;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .api-notice i { color: #e6a817; margin-top: 1px; flex-shrink: 0; }
        .api-notice code {
            background: rgba(0,0,0,0.06);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* 使用说明 */
        .info-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 26px 28px;
        }
        .info-card h2 { font-size: 17px; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .info-card h2 i { color: var(--primary); }
        .info-list { list-style: none; }
        .info-list li {
            position: relative;
            padding: 7px 0 7px 20px;
            font-size: 14px;
            color: var(--text-sub);
            border-bottom: 1px dashed var(--border);
        }
        .info-list li:last-child { border-bottom: none; }
        .info-list li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
        }

        /* 页脚 */
        footer {
            background: var(--primary);
            color: rgba(255,255,255,0.8);
            text-align: center;
            padding: 18px;
            font-size: 13px;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .panel-row { grid-template-columns: 1fr; }
            .divider-col { width: 100%; height: 36px; }
            .arrow-icon { transform: rotate(90deg); }
            .page-header h1 { font-size: 22px; }
            .btn-swap { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="topbar">
        <a class="logo" href="../index.html" style="text-decoration:none">雪域安多·藏韵传承</a>
        <a href="../index.html"><i class="fa fa-home"></i> 首页</a>
        <span class="sep">›</span>
        <span>藏汉互译</span>
    </div>

    <!-- 页头 -->
    <div class="page-header">
        <h1>藏汉互译工具</h1>
        <p>支持藏语 ⇄ 汉语双向翻译，由MyMemory翻译API提供支持</p>
        <span class="badge"><i class="fa fa-language"></i>བོད་སྐད་ · 中文</span>
    </div>

    <!-- 主体 -->
    <div class="main">

        <!-- 方向选择 -->
        <div class="direction-bar">
            <label>翻译方向：</label>
            <button class="btn-dir active" id="btn-zh2bo" onclick="setDirection('zh','bo')">
                <i class="fa fa-arrow-right"></i> 汉语 → 藏语
            </button>
            <button class="btn-dir" id="btn-bo2zh" onclick="setDirection('bo','zh')">
                <i class="fa fa-arrow-right"></i> 藏语 → 汉语
            </button>
            <button class="btn-swap" onclick="swapDirection()" title="互换方向">
                <i class="fa fa-exchange"></i> 互换
            </button>
        </div>

        <!-- 翻译卡片 -->
        <div class="translate-card">
            <div class="panel-row">
                <!-- 输入区 -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="lang-label" id="srcLabel">
                            <i class="fa fa-pencil"></i> 汉语输入
                        </span>
                        <span class="char-count" id="charCount">0 字</span>
                    </div>
                    <textarea class="text-area" id="inputText"
                        placeholder="请输入需要翻译的文字..."
                        oninput="onInput()"
                        maxlength="2000"></textarea>
                    <div class="panel-footer">
                        <button class="action-btn" onclick="clearAll()">
                            <i class="fa fa-trash-o"></i> 清空
                        </button>
                    </div>
                </div>

                <!-- 分隔 -->
                <div class="divider-col">
                    <i class="fa fa-arrow-right arrow-icon" id="arrowIcon"></i>
                </div>

                <!-- 输出区 -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="lang-label" id="tgtLabel">
                            <i class="fa fa-check"></i> 藏语结果
                        </span>
                    </div>
                    <textarea class="text-area output tibetan" id="outputText"
                        readonly
                        placeholder="翻译结果将显示在这里…"></textarea>
                    <div class="panel-footer">
                        <button class="action-btn" onclick="copyResult()">
                            <i class="fa fa-copy"></i> 复制
                        </button>
                    </div>
                </div>
            </div>

            <!-- 翻译按钮 -->
            <div class="translate-btn-wrap">
                <button class="translate-btn" id="translateBtn" onclick="doTranslate()">
                    <i class="fa fa-language"></i> 开始翻译
                </button>
            </div>

            <!-- 状态提示 -->
            <div class="status-bar" id="statusBar"></div>
        </div>

        <!-- 使用说明 -->
        <div class="info-card">
            <h2><i class="fa fa-info-circle"></i> 使用说明</h2>
            <ul class="info-list">
                <li>支持藏语（བོད་སྐད་）⇄ 汉语双向翻译，语言代码：藏语 <code style="background:#f0ebe4;padding:1px 5px;border-radius:3px;">bo</code>，汉语 <code style="background:#f0ebe4;padding:1px 5px;border-radius:3px;">zh</code>。</li>
                <li>由MyMemory翻译API提供支持，单次最多 2000 字符。</li>
                <li>翻译结果仅供学习与参考，正式文件请人工核对。</li>
                <li>如翻译失败，请检查网络连接是否畅通。</li>
                <li>支持快捷键 Ctrl+Enter 快速翻译。</li>
            </ul>
        </div>
    </div>

    <footer>
        <p>青海安多藏族文化传播平台 &copy; 2026 &nbsp;·&nbsp; 翻译服务由MyMemory提供</p>
    </footer>

    <script>
        let srcLang = 'zh';
        let tgtLang = 'bo';

        const LANG_NAMES = { zh: '汉语', bo: '藏语' };

        function setDirection(src, tgt) {
            srcLang = src;
            tgtLang = tgt;
            document.getElementById('btn-zh2bo').classList.toggle('active', src === 'zh');
            document.getElementById('btn-bo2zh').classList.toggle('active', src === 'bo');
            document.getElementById('srcLabel').innerHTML =
                `<i class="fa fa-pencil"></i> ${LANG_NAMES[src]}输入`;
            document.getElementById('tgtLabel').innerHTML =
                `<i class="fa fa-check"></i> ${LANG_NAMES[tgt]}结果`;
            document.getElementById('inputText').className =
                'text-area' + (src === 'bo' ? ' tibetan' : '');
            document.getElementById('outputText').className =
                'text-area output' + (tgt === 'bo' ? ' tibetan' : '');
            document.getElementById('inputText').placeholder =
                `请输入需要翻译的${LANG_NAMES[src]}…`;
            document.getElementById('outputText').value = '';
            setStatus('');
        }

        function swapDirection() {
            const [s, t] = srcLang === 'zh' ? ['bo', 'zh'] : ['zh', 'bo'];
            // 将输出内容移到输入
            const out = document.getElementById('outputText').value;
            setDirection(s, t);
            document.getElementById('inputText').value = out;
            onInput();
            document.getElementById('outputText').value = '';
        }

        function onInput() {
            const len = document.getElementById('inputText').value.length;
            document.getElementById('charCount').textContent = len + ' 字';
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
            document.getElementById('charCount').textContent = '0 字';
            setStatus('');
        }

        function copyResult() {
            const out = document.getElementById('outputText').value.trim();
            if (!out) { setStatus('没有可复制的内容', 'error'); return; }
            navigator.clipboard.writeText(out).then(() => {
                setStatus('已复制到剪贴板', 'success');
            }).catch(() => {
                // 降级
                document.getElementById('outputText').select();
                document.execCommand('copy');
                setStatus('已复制到剪贴板', 'success');
            });
        }

        function setStatus(msg, type) {
            const el = document.getElementById('statusBar');
            el.textContent = msg;
            el.className = 'status-bar' + (type ? ' ' + type : '');
        }

        async function doTranslate() {
            const q = document.getElementById('inputText').value.trim();
            if (!q) { setStatus('请先输入需要翻译的文字', 'error'); return; }
            const btn = document.getElementById('translateBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 翻译中…';
            setStatus('正在翻译…');
            const langpair = srcLang === 'zh' ? 'zh-CN|bo' : 'bo|zh-CN';
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=${langpair}`;
            try {
                const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
                if (!resp.ok) throw new Error('网络错误 ' + resp.status);
                const data = await resp.json();
                if (data.responseStatus === 200) {
                    document.getElementById('outputText').value = data.responseData.translatedText;
                    setStatus('翻译完成 ✓', 'success');
                } else {
                    setStatus('翻译失败：' + (data.responseDetails || data.responseStatus), 'error');
                }
            } catch(e) {
                if (e.name === 'TimeoutError') setStatus('请求超时，请检查网络', 'error');
                else setStatus('请求失败：' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-language"></i> 开始翻译';
            }
        }

        // 支持 Ctrl+Enter 翻译
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doTranslate();
        });
    </script>

<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed;bottom:30px;right:30px;width:50px;height:50px;background:#9B2B25;color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.15);border:none;z-index:998;transition:all 0.3s;" aria-label="返回顶部">
  <i class="fa fa-arrow-up"></i>
</button>
<script>
window.addEventListener('scroll',function(){var b=document.getElementById('backToTop');b.style.display=window.pageYOffset>300?'flex':'none';});
</script>

</body>
</html>
