<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藏族文化专题 - 郎木寺</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f7f3ee;
      color: #333;
      line-height: 1.7;
    }

    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧菜单 */
    .left-menu {
      width: 280px;
      background: linear-gradient(135deg, #f9f1e9 0%, #f1e2d3 100%);
      border-right: 1px solid #e8d5c0;
      padding: 30px 0;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }

    .menu-title {
      text-align: center;
      font-size: 20px;
      color: #8b4c39;
      margin-bottom: 30px;
      font-weight: bold;
      padding: 0 20px;
      position: relative;
    }

    .menu-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #d48a5d;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .menu-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #555;
      position: relative;
      overflow: hidden;
    }

    .menu-item:hover {
      background-color: rgba(212, 138, 93, 0.1);
      color: #8b4c39;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, #d48a5d 0%, #e6a87a 100%);
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #8b4c39;
    }

    /* 右侧内容 */
    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 80px;
      background: #fff;
      position: relative;
    }

    /* 图片样式 */
    .culture-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      margin: 20px 0 30px 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }

    .culture-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* 轮播图样式 */
    .carousel-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 20px 0 30px 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .carousel-control {
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .carousel-control:hover {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.1);
    }

    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .carousel-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-indicator.active {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.2);
    }

    /* 板块 */
    .section {
      margin-bottom: 60px;
      animation: fadeIn 0.6s ease forwards;
    }

    .section-title {
      font-size: 24px;
      color: #8b4c39;
      margin-bottom: 25px;
      padding-left: 15px;
      border-left: 5px solid #d48a5d;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #d48a5d, transparent);
      margin-left: 20px;
    }

    /* 卡片样式 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid #f0e6d8;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #8b4c39;
      margin-bottom: 12px;
      border-bottom: 2px solid #d48a5d;
      padding-bottom: 8px;
    }

    .card-content {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      text-align: justify;
      margin-bottom: 15px;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
    }

    .link-button {
      background: linear-gradient(135deg, #d48a5d, #8b4c39);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .link-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 138, 93, 0.5);
      background: linear-gradient(135deg, #8b4c39, #d48a5d);
    }

    .section-text {
      font-size: 16px;
      color: #444;
      margin-bottom: 15px;
      line-height: 1.8;
      text-align: justify;
      padding: 0 10px;
    }

    .section-text:last-child {
      margin-bottom: 0;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .left-menu {
        width: 100%;
        height: auto;
        max-height: 200px;
        padding: 20px 0;
      }

      .menu-item {
        padding: 12px 20px;
        display: inline-block;
        margin: 5px 10px;
        border-radius: 20px;
      }

      .right-content {
        padding: 30px 20px;
      }

      .section-title {
        font-size: 20px;
      }

      .section-text {
        font-size: 15px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d48a5d;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8b4c39;
    }
  </style>
</head>

<body>
  <div id="app" class="app-container">
    <!-- 左侧菜单 -->
    <div class="left-menu">
      <div class="menu-title">藏族文化专题</div>
      <div
        class="menu-item"
        :class="{ active: currentMenu === item }"
        v-for="item in menuList"
        @click="selectMenu(item)"
      >
        {{ item }}
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="right-content" v-if="currentContent || currentCards.length > 0 || currentCarousel.length > 0">
      <div class="section">
        <div class="section-title">{{ currentMenu }}</div>
        
        <!-- 图片展示 -->
        <img v-if="currentImg && currentCarousel.length === 0" :src="currentImg" class="culture-img" alt="文化图片">
        
        <!-- 轮播图 -->
        <div v-if="currentCarousel.length > 0" class="carousel-container">
          <div class="carousel-wrapper" :style="{ transform: `translateX(-${currentIndex * 100}%)` }">
            <div v-for="(item, index) in currentCarousel" :key="index" class="carousel-item">
              <img :src="item" alt="轮播图片">
            </div>
          </div>
          <div class="carousel-controls">
            <button class="carousel-control" @click="prev">&lt;</button>
            <button class="carousel-control" @click="next">&gt;</button>
          </div>
          <div class="carousel-indicators">
            <div 
              v-for="(item, index) in currentCarousel" 
              :key="index" 
              class="carousel-indicator" 
              :class="{ active: currentIndex === index }"
              @click="goToSlide(index)"
            ></div>
          </div>
        </div>
        
        <!-- 卡片显示 -->
        <div v-if="currentCards.length > 0" class="card-container">
          <div v-for="(card, index) in currentCards" :key="index" class="card">
            <div class="card-title">{{ card.title }}</div>
            <div class="card-content">{{ card.content }}</div>
            <a v-if="card.url" :href="card.url" target="_blank" class="card-link">
              <button class="link-button">访问链接</button>
            </a>
          </div>
        </div>
        
        <!-- 普通文本显示 -->
        <div v-else class="section-text" v-for="(text, i) in currentContent" :key="i">
          {{ text }}
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          currentMenu: "郎木寺 ལང་མུ་སི།",
          menuList: ["郎木寺 ལང་མུ་སི།", "历史沿革 ལོ་རྒྱུས་འབྱུང་བ་", "建筑特色 རྫོགས་འབྲུག་ཁྱད་ཆོས་", "宗教意义 གནས་ལྡན་དགོན་པའི་དོན་དམ་", "文化地位 རིག་གནས་ས་གནས་", "旅游服务 ལོ་ཉུང་ཞབས་ཞུ་"],
          currentContent: [],
          currentImg: "",
          currentCarousel: [],
          currentCards: [],
          currentIndex: 0
        };
      },
      mounted() {
        this.selectMenu("郎木寺 ལང་མུ་སི།");
      },
      methods: {
        selectMenu(item) {
          this.currentMenu = item;

          const contentMap = {
            "郎木寺 ལང་མུ་སི།": {
              carousel: [
                "images/lms1.jpg",
                "images/lms2.jpg",
                "images/lms3.jpg",
                "images/lms4.jpg",
                "images/lms5.jpg",
                "images/lms6.jpg",
                "images/lms7.jpg",
                "images/lms8.jpg",
                "images/lms9.jpg"
              ],
              cards: [
                {
                  title: "郎木寺简介 ལང་མུ་སིའི་གཏན་འཁེལ་གསལ་བཤད།",
                  content: "郎木寺始建于公元1748年（清乾隆十三年），由格鲁派高僧赛赤·坚参桑盖活佛主持创建，是安多藏区重要的格鲁派寺院。寺院地处甘肃甘南与四川阿坝交界的白龙江源头，自古就是川甘青交界地带的宗教、文化与商贸枢纽，历经近300年的传承与扩建，逐步形成了如今融合藏传佛教寺院与藏乡古镇的文化格局，见证了安多藏区与康巴藏区的文化交融，是汉藏茶马古道上的重要文化节点。ལང་མུ་སི་ནི་སྤྱི་ལོ་1748ལོར་（ཆིང་རྒྱལ་རབས་ཀྱི་ཆན་ལུང་ལོ་13པ）དགེ་ལུགས་པའི་གྲུབ་མཐོན་སེ་ཁྲི་རྗེ་བཙུན་བསམ་གཏན་བཟང་པོས་གཙོ་སྐྱོང་གནང་སྟེ་བཞེངས་པ་དང་།ཨ་མདོ་བོད་རིགས་ས་ཁུལ་གྱི་དགེ་ལུགས་པའི་དགོན་པ་གལ་ཆེན་ཞིག་ཡིན།དགོན་པ་དེ་ཀན་སུའུ་ཀན་ལྷོ་དང་སི་ཁྲོན་རྔ་བ་ཁུལ་གྱི་མཚམས་སུ་གནས་པའི་དབལ་ཆུའི་འབྱུང་ཁུངས་སུ་གནས་ཤིང་།གནའ་ནས་བཟུང་སི་ཀན་མཚོ་གསུམ་གྱི་མཚམས་ཀྱི་ཆོས་ལུགས་དང་རིག་གནས།ཚོང་དོན་བཅས་ཀྱི་ལྟེ་གནས་སུ་གྱུར་ཡོད།ལོ་ངོ་300ཙམ་གྱི་རྒྱུན་འཛིན་དང་རྒྱ་བསྐྱེད་བརྒྱུད་དེ།ད་ལྟའི་བོད་བརྒྱུད་ནང་བསྟན་གྱི་དགོན་པ་དང་བོད་གྲོང་རྙིང་པ་མཉམ་འདྲེས་བྱས་པའི་རིག་གནས་ཀྱི་ཆ་ཤས་ཆགས་ཡོད་པ་དང་།ཨ་མདོ་བོད་རིགས་ས་ཁུལ་དང་ཁམས་པ་བོད་རིགས་ས་ཁུལ་གྱི་རིག་གནས་མཉམ་འདྲེས་ལ་དཔང་པོ་བྱས་ཡོད་པ་མ་ཟད།རྒྱ་བོད་ཇ་རྟ་གཞུང་ལམ་གྱི་རིག་གནས་ཀྱི་གནད་ས་གལ་ཆེན་ཞིག་ཀྱང་ཡིན།"
                }
              ]
            },
            "历史沿革 ལོ་རྒྱུས་འབྱུང་བ་": {
              cards: [
                {
                  title: "创建历史 གནང་བ་ལོ་རྒྱུས།",
                  content: "郎木寺创建于1748年，由格鲁派高僧赛赤·坚参桑盖活佛主持创建。寺院地处甘肃甘南与四川阿坝交界的白龙江源头，自古就是川甘青交界地带的宗教、文化与商贸枢纽。历经近300年的传承与扩建，逐步形成了如今融合藏传佛教寺院与藏乡古镇的文化格局。ལང་མུ་སི་ནི་1748ལོར་དགེ་ལུགས་པའི་གྲུབ་མཐོན་སེ་ཁྲི་རྗེ་བཙུན་བསམ་གཏན་བཟང་པོས་གཙོ་སྐྱོང་གནང་སྟེ་བཞེངས་པ་ཡིན།དགོན་པ་དེ་ཀན་སུའུ་ཀན་ལྷོ་དང་སི་ཁྲོན་རྔ་བ་ཁུལ་གྱི་མཚམས་སུ་གནས་པའི་དབལ་ཆུའི་འབྱུང་ཁུངས་སུ་གནས་ཤིང་།གནའ་ནས་བཟུང་སི་ཀན་མཚོ་གསུམ་གྱི་མཚམས་ཀྱི་ཆོས་ལུགས་དང་རིག་གནས།ཚོང་དོན་བཅས་ཀྱི་ལྟེ་གནས་སུ་གྱུར་ཡོད།ལོ་ངོ་300ཙམ་གྱི་རྒྱུན་འཛིན་དང་རྒྱ་བསྐྱེད་བརྒྱུད་དེ།ད་ལྟའི་བོད་བརྒྱུད་ནང་བསྟན་གྱི་དགོན་པ་དང་བོད་གྲོང་རྙིང་པ་མཉམ་འདྲེས་བྱས་པའི་རིག་གནས་ཀྱི་ཆ་ཤས་ཆགས་ཡོད།"
                },
