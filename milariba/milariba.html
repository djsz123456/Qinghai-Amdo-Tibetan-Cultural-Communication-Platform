<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藏族文化专题 - 米拉日巴佛阁</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f7f3ee;
      color: #333;
      line-height: 1.7;
    }

    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧菜单 */
    .left-menu {
      width: 280px;
      background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
      border-right: 1px solid #D2B48C;
      padding: 30px 0;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }

    .menu-title {
      text-align: center;
      font-size: 20px;
      color: #FFD700;
      margin-bottom: 30px;
      font-weight: bold;
      padding: 0 20px;
      position: relative;
    }

    .menu-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #FFD700;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .menu-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #F5F5DC;
      position: relative;
      overflow: hidden;
    }

    .menu-item:hover {
      background-color: rgba(255, 215, 0, 0.1);
      color: #FFD700;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, #FFD700 0%, #DAA520 100%);
      color: #8B0000;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #8B0000;
    }

    /* 右侧内容 */
    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 80px;
      background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
      position: relative;
    }

    .right-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M20,20 Q40,5 60,20 T100,20 M20,50 Q40,35 60,50 T100,50 M20,80 Q40,65 60,80 T100,80" stroke="%23FFD700" stroke-width="0.5" fill="none" opacity="0.1"/></svg>');
      background-size: 200px;
      opacity: 0.1;
      pointer-events: none;
    }

    /* 图片样式 */
    .culture-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      margin: 20px 0 30px 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      border: 2px solid #FFD700;
    }

    .culture-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* 轮播图样式 */
    .carousel-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 20px 0 30px 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      border: 2px solid #FFD700;
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .carousel-control {
      background: rgba(255, 215, 0, 0.8);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      color: #8B0000;
    }

    .carousel-control:hover {
      background: rgba(255, 215, 0, 1);
      transform: scale(1.1);
    }

    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .carousel-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-indicator.active {
      background: rgba(255, 215, 0, 1);
      transform: scale(1.2);
    }

    /* 板块 */
    .section {
      margin-bottom: 60px;
      animation: fadeIn 0.6s ease forwards;
      position: relative;
      z-index: 1;
    }

    .section-title {
      font-size: 28px;
      color: #FFD700;
      margin-bottom: 25px;
      padding-left: 15px;
      border-left: 5px solid #FFD700;
      font-weight: bold;
      display: flex;
      align-items: center;
      text-align: center;
      justify-content: center;
    }

    .section-subtitle {
      font-size: 16px;
      color: #F5F5DC;
      text-align: center;
      margin-bottom: 30px;
      font-weight: normal;
    }

    .section-divider {
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
      margin: 0 auto 30px;
      position: relative;
    }

    .section-divider::before {
      content: '❀';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      color: #FFD700;
      font-size: 20px;
    }

    /* 卡片样式 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.8) 0%, rgba(165, 42, 42, 0.8) 100%);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid #FFD700;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2);
      border-color: #FFD700;
    }

    .card-icon {
      text-align: center;
      margin-bottom: 15px;
    }

    .card-icon svg {
      width: 40px;
      height: 40px;
      fill: #D2B48C;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 12px;
      text-align: center;
      border-bottom: 2px solid #FFD700;
      padding-bottom: 8px;
    }

    .card-tag {
      font-size: 14px;
      color: #F5F5DC;
      text-align: center;
      margin-bottom: 15px;
      font-style: italic;
    }

    .card-content {
      font-size: 15px;
      color: #F5F5DC;
      line-height: 1.6;
      text-align: justify;
      margin-bottom: 15px;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
    }

    .link-button {
      background: linear-gradient(135deg, #FFD700, #DAA520);
      color: #8B0000;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
      font-weight: bold;
    }

    .link-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.5);
      background: linear-gradient(135deg, #DAA520, #FFD700);
    }

    .section-text {
      font-size: 16px;
      color: #F5F5DC;
      margin-bottom: 15px;
      line-height: 1.8;
      text-align: justify;
      padding: 0 10px;
    }

    .section-text:last-child {
      margin-bottom: 0;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .left-menu {
        width: 100%;
        height: auto;
        max-height: 200px;
        padding: 20px 0;
      }

      .menu-item {
        padding: 12px 20px;
        display: inline-block;
        margin: 5px 10px;
        border-radius: 20px;
      }

      .right-content {
        padding: 30px 20px;
      }

      .section-title {
        font-size: 24px;
      }

      .section-text {
        font-size: 15px;
      }

      .card-container {
        grid-template-columns: 1fr;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #8B0000;
    }

    ::-webkit-scrollbar-thumb {
      background: #FFD700;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #DAA520;
    }
  </style>
</head>

<body>
  <div id="app" class="app-container">
    <!-- 左侧菜单 -->
    <div class="left-menu">
      <div class="menu-title">米拉日巴佛阁<br><small style="font-size: 14px;">མི་ལ་རས་པའི་ཆོས་སྡེ།</small></div>
      <div
        class="menu-item"
        :class="{ active: currentMenu === item }"
        v-for="item in menuList"
        @click="selectMenu(item)"
      >
        {{ item }}
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="right-content" v-if="currentContent || currentCards.length > 0 || currentCarousel.length > 0">
      <div class="section">
        <div class="section-title">{{ currentMenu }}</div>
        <div class="section-subtitle" v-if="currentSubtitle">{{ currentSubtitle }}</div>
        <div class="section-divider"></div>
        
        <!-- 图片展示 -->
        <img v-if="currentImg && currentCarousel.length === 0" :src="currentImg" class="culture-img" alt="文化图片">
        
        <!-- 轮播图 -->
        <div v-if="currentCarousel.length > 0" class="carousel-container">
          <div class="carousel-wrapper" :style="{ transform: `translateX(-${currentIndex * 100}%)` }">
            <div v-for="(item, index) in currentCarousel" :key="index" class="carousel-item">
              <img :src="item" alt="轮播图片">
            </div>
          </div>
          <div class="carousel-controls">
            <button class="carousel-control" @click="prev">&lt;</button>
            <button class="carousel-control" @click="next">&gt;</button>
          </div>
          <div class="carousel-indicators">
            <div 
              v-for="(item, index) in currentCarousel" 
              :key="index" 
              class="carousel-indicator" 
              :class="{ active: currentIndex === index }"
              @click="goToSlide(index)"
            ></div>
          </div>
        </div>
        
        <!-- 卡片显示 -->
        <div v-if="currentCards.length > 0" class="card-container">
          <div v-for="(card, index) in currentCards" :key="index" class="card">
            <div class="card-icon" v-if="card.icon">
              <svg viewBox="0 0 24 24" v-html="card.icon"></svg>
            </div>
            <div class="card-title">{{ card.title }}</div>
            <div class="card-tag" v-if="card.tag">{{ card.tag }}</div>
            <div class="card-content">{{ card.content }}</div>
            <a v-if="card.url" :href="card.url" target="_blank" class="card-link">
              <button class="link-button">访问链接</button>
            </a>
          </div>
        </div>
        
        <!-- 普通文本显示 -->
        <div v-else class="section-text" v-for="(text, i) in currentContent" :key="i">
          {{ text }}
        </div>
      </div>
    </div>


  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          currentMenu: "米拉日巴佛阁 མི་ལ་རས་པའི་ཆོས་སྡེ།",
          currentSubtitle: "安多藏区格鲁派佛教圣地",
          menuList: [
            "米拉日巴佛阁 མི་ལ་རས་པའི་ཆོས་སྡེ།", 
            "历史沿革 ལོ་རྒྱུས་འབྱུང་བ།", 
            "建筑特色 རྫོགས་འབྲུག་ཁྱད་ཆོས།", 
            "宗教意义 གནས་ལྡན་དགོན་པའི་དོན་དམ།", 
            "文化地位 རིག་གནས་ས་གནས།", 
            "旅游服务 ལོ་ཉུང་ཞབས་ཞུ།"
          ],
          currentContent: [],
          currentImg: "",
          currentCarousel: [],
          currentCards: [],
          currentIndex: 0,
          showFooter: true
        };
      },
      mounted() {
        this.selectMenu("米拉日巴佛阁 མི་ལ་རས་པའི་ཆོས་སྡེ།");
      },
      methods: {
        selectMenu(item) {
          this.currentMenu = item;
          this.currentSubtitle = "";

          const contentMap = {
            "米拉日巴佛阁 མི་ལ་རས་པའི་ཆོས་སྡེ།": {
              subtitle: "安多藏区格鲁派佛教圣地",
              carousel: [
                "images/mlb1.jpg",
                "images/mlb2.jpg",
                "images/mlb3.jpg",
                "images/mlb4.jpg",
                "images/mlb5.jpg"
              ],
              cards: [
                {
                  title: "米拉日巴佛阁简介",
                  tag: "安多藏区唯一供奉米拉日巴大师的佛阁",
                  content: "米拉日巴佛阁位于甘肃省甘南藏族自治州合作市，是为纪念藏传佛教噶举派大师米拉日巴而修建的九层藏式佛阁。佛阁始建于1988年，是安多藏区唯一一座供奉米拉日巴大师的佛阁，也是安多地区重要的藏传佛教文化地标。佛阁融合了藏传佛教多教派文化，承载着藏区民众的精神信仰与文化传承。",
                  icon: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>'
                }
              ]
            },
            "历史沿革 ལོ་རྒྱུས་འབྱུང་བ།": {
              subtitle: "安多藏区唯一供奉米拉日巴大师的佛阁",
              cards: [
                {
                  title: "创建历史",
                  tag: "1988年始建",
                  content: "米拉日巴佛阁始建于1988年，是为纪念藏传佛教噶举派大师米拉日巴而修建。佛阁历经多年修建与完善，成为安多藏区重要的藏传佛教文化地标，承载着藏传佛教噶举派、格鲁派等多教派的文化传承，是藏区宗教文化融合的重要见证。",
                  icon: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>'
                },
                {
                  title: "发展历程",
                  tag: "文化传承见证",
                  content: "佛阁自建成以来，不断完善和发展，逐渐成为安多藏区重要的宗教文化活动中心。经过多次扩建和修缮，佛阁现已成为集宗教修行、文化传承、旅游观光为一体的综合性文化场所，吸引着来自各地的信众和游客。",
                  icon: '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>'
                }
              ]
            },
            "建筑特色 རྫོགས་འབྲུག་ཁྱད་ཆོས།": {
              subtitle: "九层藏式佛阁建筑典范",
              cards: [
                {
                  title: "建筑风格",
                  tag: "藏式高层建筑典范",
                  content: "佛阁为典型的藏式高层建筑，共九层，整体遵循藏传佛教寺院建筑规制，金顶飞檐、红墙金饰，气势恢宏。建筑内部每层供奉不同的藏传佛教佛像、菩萨与护法神，殿内装饰有精美唐卡、壁画、木雕与酥油花。",
                  icon: '<path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/>'
                },
                {
                  title: "艺术精华",
                  tag: "藏传佛教艺术融合",

                  icon: '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>'
                }
              ]
            },
            "宗教意义 གནས་ལྡན་དགོན་པའི་དོན་དམ།": {
              subtitle: "藏传佛教文化传承圣地",
              cards: [
                {
                  title: "修行圣地",
                  tag: "藏传佛教修行中心",

                },
                {
                  title: "文化枢纽",
                  tag: "宗教文化传播中心",
                  content: "佛阁是藏传佛教文化在安多地区传播的重要枢纽，承载着藏区民众的精神信仰与文化传承。通过日常的宗教活动和文化交流，佛阁成为了连接传统与现代、宗教与世俗的重要桥梁。",
                  icon: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>'
                }
              ]
            },
            "文化地位 རིག་གནས་ས་གནས།": {
              subtitle: "甘南安多文化区核心宗教地标",
              cards: [
                {
                  title: "文化符号",
                  tag: "安多文化核心象征",
                  content: "米拉日巴佛阁是甘南安多文化区的核心宗教文化符号，是安多藏区藏传佛教文化的重要载体。佛阁融合了藏传佛教多教派文化、安多藏式艺术与藏族民俗文化，是研究安多藏区宗教、文化、艺术的重要样本。",
                  icon: '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>'
                },
                {
