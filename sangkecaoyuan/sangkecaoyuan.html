<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藏族文化专题 - 桑科草原</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f7f3ee;
      color: #333;
      line-height: 1.7;
    }

    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧菜单 */
    .left-menu {
      width: 280px;
      background: linear-gradient(135deg, #f9f1e9 0%, #f1e2d3 100%);
      border-right: 1px solid #e8d5c0;
      padding: 30px 0;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }

    .menu-title {
      text-align: center;
      font-size: 20px;
      color: #8b4c39;
      margin-bottom: 30px;
      font-weight: bold;
      padding: 0 20px;
      position: relative;
    }

    .menu-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #d48a5d;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .menu-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #555;
      position: relative;
      overflow: hidden;
    }

    .menu-item:hover {
      background-color: rgba(212, 138, 93, 0.1);
      color: #8b4c39;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, #d48a5d 0%, #e6a87a 100%);
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #8b4c39;
    }

    /* 右侧内容 */
    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 80px;
      background: #fff;
      position: relative;
    }

    /* 图片样式 */
    .culture-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      margin: 20px 0 30px 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }

    .culture-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* 轮播图样式 */
    .carousel-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 20px 0 30px 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .carousel-control {
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .carousel-control:hover {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.1);
    }

    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .carousel-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-indicator.active {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.2);
    }

    /* 板块 */
    .section {
      margin-bottom: 60px;
      animation: fadeIn 0.6s ease forwards;
    }

    .section-title {
      font-size: 24px;
      color: #8b4c39;
      margin-bottom: 25px;
      padding-left: 15px;
      border-left: 5px solid #d48a5d;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #d48a5d, transparent);
      margin-left: 20px;
    }

    /* 卡片样式 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid #f0e6d8;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #8b4c39;
      margin-bottom: 12px;
      border-bottom: 2px solid #d48a5d;
      padding-bottom: 8px;
    }

    .card-content {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      text-align: justify;
      margin-bottom: 15px;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
    }

    .link-button {
      background: linear-gradient(135deg, #d48a5d, #8b4c39);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .link-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 138, 93, 0.5);
      background: linear-gradient(135deg, #8b4c39, #d48a5d);
    }

    .section-text {
      font-size: 16px;
      color: #444;
      margin-bottom: 15px;
      line-height: 1.8;
      text-align: justify;
      padding: 0 10px;
    }

    .section-text:last-child {
      margin-bottom: 0;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .left-menu {
        width: 100%;
        height: auto;
        max-height: 200px;
        padding: 20px 0;
      }

      .menu-item {
        padding: 12px 20px;
        display: inline-block;
        margin: 5px 10px;
        border-radius: 20px;
      }

      .right-content {
        padding: 30px 20px;
      }

      .section-title {
        font-size: 20px;
      }

      .section-text {
        font-size: 15px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d48a5d;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8b4c39;
    }
  </style>
</head>

<body>
  <div id="app" class="app-container">
    <!-- 左侧菜单 -->
    <div class="left-menu">
      <div class="menu-title">藏族文化专题</div>
      <div
        class="menu-item"
        :class="{ active: currentMenu === item }"
        v-for="item in menuList"
        @click="selectMenu(item)"
      >
        {{ item }}
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="right-content" v-if="currentContent || currentCards.length > 0 || currentCarousel.length > 0">
      <div class="section">
        <div class="section-title">{{ currentMenu }}</div>
        
        <!-- 图片展示 -->
        <img v-if="currentImg && currentCarousel.length === 0" :src="currentImg" class="culture-img" alt="文化图片">
        
        <!-- 轮播图 -->
        <div v-if="currentCarousel.length > 0" class="carousel-container">
          <div class="carousel-wrapper" :style="{ transform: `translateX(-${currentIndex * 100}%)` }">
            <div v-for="(item, index) in currentCarousel" :key="index" class="carousel-item">
              <img :src="item" alt="轮播图片">
            </div>
          </div>
          <div class="carousel-controls">
            <button class="carousel-control" @click="prev">&lt;</button>
            <button class="carousel-control" @click="next">&gt;</button>
          </div>
          <div class="carousel-indicators">
            <div 
              v-for="(item, index) in currentCarousel" 
              :key="index" 
              class="carousel-indicator" 
              :class="{ active: currentIndex === index }"
              @click="goToSlide(index)"
            ></div>
          </div>
        </div>
        
        <!-- 卡片显示 -->
        <div v-if="currentCards.length > 0" class="card-container">
          <div v-for="(card, index) in currentCards" :key="index" class="card">
            <div class="card-title">{{ card.title }}</div>
            <div class="card-content">{{ card.content }}</div>
            <a v-if="card.url" :href="card.url" target="_blank" class="card-link">
              <button class="link-button">访问链接</button>
            </a>
          </div>
        </div>
        
        <!-- 普通文本显示 -->
        <div v-else class="section-text" v-for="(text, i) in currentContent" :key="i">
          {{ text }}
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          currentMenu: "桑科草原",
          menuList: ["桑科草原", "历史沿革", "景观特色", "文化意义", "文化地位", "旅游服务"],
          currentContent: [],
          currentImg: "",
          currentCarousel: [],
          currentCards: [],
          currentIndex: 0
        };
      },
      mounted() {
        this.selectMenu("桑科草原");
      },
      methods: {
        selectMenu(item) {
          this.currentMenu = item;

          const contentMap = {
            "桑科草原": {
              carousel: [
                "images/skcy1.jpg",
                "images/skcy2.jpg",
                "images/skcy3.jpg",
                "images/skcy4.jpg",
                "images/skcy5.jpg"
              ],
              cards: [
                {
                  title: "桑科草原简介",
                  content: "桑科草原位于甘肃省甘南藏族自治州夏河县，是安多藏区最具代表性的高山草原之一。这片草原自古就是安多藏族游牧文化的核心承载地，是拉卜楞寺所属的 \"十三庄\" 草原，历史上是藏族部落游牧、集会的重要场所。"
                }
              ]
            },
            "历史沿革": {
              cards: [
                {
                  title: "历史背景",
                  content: "桑科草原位于甘肃省甘南藏族自治州夏河县，是安多藏区最具代表性的高山草原之一。这片草原自古就是安多藏族游牧文化的核心承载地，是拉卜楞寺所属的 \"十三庄\" 草原，历史上是藏族部落游牧、集会的重要场所。"
                },
                {
                  title: "文化传承",
                  content: "桑科草原见证了安多藏区游牧文明的千年传承，是拉卜楞寺宗教文化与藏乡民俗的重要依托，也是茶马古道上重要的游牧商贸节点，承载着安多藏族的历史记忆与文化根脉。"
                }
              ]
            },
            "景观特色": {
              cards: [
                {
                  title: "自然风光",
                  content: "桑科草原属于高山草甸草原，平均海拔 3000 米以上，草原地势开阔平缓，大夏河穿境而过，形成了 \"水草丰美、牛羊成群\" 的高原牧场景观。春夏时节，草原上野花盛开、绿草如茵，牛羊散落其间，远处雪山与蓝天相映，构成了安多藏区最经典的高原草原画卷；秋冬时节，草原银装素裹，尽显雪域高原的雄浑壮阔。"
                },
                {
                  title: "地理环境",
                  content: "草原周边与拉卜楞寺、甘加草原相连，是安多藏区自然景观与人文景观交融的典范。"
                }
              ]
            },
            "文化意义": {
              cards: [
                {
                  title: "游牧文化",
                  content: "桑科草原是安多藏族游牧文化的活态博物馆，完整保留了藏族传统游牧生活、民俗节庆与宗教文化。每年夏季，草原上会举办盛大的香浪节、赛马会、藏戏表演等民俗活动，是安多藏族展示文化、传承信仰的重要舞台。"
                },
                {
                  title: "宗教融合",
                  content: "同时，桑科草原是拉卜楞寺僧众进行宗教活动、夏季修行的重要场所，承载着藏传佛教文化与游牧文化的深度融合，是安多文化 \"神山、草原、寺院\" 共生理念的核心体现。"
                }
              ]
            },
            "文化地位": {
              cards: [
                {
                  title: "文化地标",
                  content: "桑科草原是甘南安多文化区的核心自然文化地标，是安多藏区游牧文化的象征。作为拉卜楞寺的配套草原，桑科草原与拉卜楞寺共同构成了安多文化 \"宗教 + 游牧\" 的完整文化生态，是研究安多藏族社会、文化、生活的重要样本。"
                },
                {
                  title: "文化传播",
                  content: "同时，桑科草原以其壮美的高原风光与浓郁的藏乡风情，成为藏族文化数字化传播的重要 IP，是展示安多藏区自然与人文魅力的核心窗口。"
                }
              ]
            },
            "旅游服务": {
              cards: [
                {
                  title: "体验项目",
                  content: "桑科草原为游客提供丰富的藏文化体验与旅游服务，包含草原观光、游牧生活体验、民俗活动参与等项目。游客可在草原上体验骑马、露营，观赏藏族赛马、锅庄舞等民俗表演，品尝藏式美食，深入了解安多藏族的游牧生活。"
                },
                {
                  title: "配套设施",
                  content: "景区配套有完善的餐饮、住宿、交通服务，同时提供专业的文化讲解，帮助游客深度理解桑科草原的游牧文化与宗教内涵，打造沉浸式的安多藏文化体验。"
                }
              ]
            }
          };

          const content = contentMap[item] || {};
          this.currentContent = []; // 不再使用文本形式
          this.currentImg = content.img || "";
          this.currentCarousel = content.carousel || [];
          this.currentCards = content.cards || [];
          this.currentIndex = 0;
        },
        prev() {
          this.currentIndex = (this.currentIndex - 1 + this.currentCarousel.length) % this.currentCarousel.length;
        },
        next() {
          this.currentIndex = (this.currentIndex + 1) % this.currentCarousel.length;
        },
        goToSlide(index) {
          this.currentIndex = index;
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
