<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藏族文化专题 - 日月山</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f7f3ee;
      color: #333;
      line-height: 1.7;
    }

    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧菜单 */
    .left-menu {
      width: 280px;
      background: linear-gradient(135deg, #f9f1e9 0%, #f1e2d3 100%);
      border-right: 1px solid #e8d5c0;
      padding: 30px 0;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }

    .menu-title {
      text-align: center;
      font-size: 20px;
      color: #8b4c39;
      margin-bottom: 30px;
      font-weight: bold;
      padding: 0 20px;
      position: relative;
    }

    .menu-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #d48a5d;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .menu-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #555;
      position: relative;
      overflow: hidden;
    }

    .menu-item:hover {
      background-color: rgba(212, 138, 93, 0.1);
      color: #8b4c39;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, #d48a5d 0%, #e6a87a 100%);
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #8b4c39;
    }

    /* 右侧内容 */
    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 80px;
      background: #fff;
      position: relative;
    }

    /* 图片样式 */
    .culture-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      margin: 20px 0 30px 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }

    .culture-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* 轮播图样式 */
    .carousel-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 20px 0 30px 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .carousel-control {
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .carousel-control:hover {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.1);
    }

    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .carousel-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-indicator.active {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.2);
    }

    /* 板块 */
    .section {
      margin-bottom: 60px;
      animation: fadeIn 0.6s ease forwards;
    }

    .section-title {
      font-size: 24px;
      color: #8b4c39;
      margin-bottom: 25px;
      padding-left: 15px;
      border-left: 5px solid #d48a5d;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #d48a5d, transparent);
      margin-left: 20px;
    }

    /* 卡片样式 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid #f0e6d8;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #8b4c39;
      margin-bottom: 12px;
      border-bottom: 2px solid #d48a5d;
      padding-bottom: 8px;
    }

    .card-content {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      text-align: justify;
      margin-bottom: 15px;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
    }

    .link-button {
      background: linear-gradient(135deg, #d48a5d, #8b4c39);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .link-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 138, 93, 0.5);
      background: linear-gradient(135deg, #8b4c39, #d48a5d);
    }

    .section-text {
      font-size: 16px;
      color: #444;
      margin-bottom: 15px;
      line-height: 1.8;
      text-align: justify;
      padding: 0 10px;
    }

    .section-text:last-child {
      margin-bottom: 0;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .left-menu {
        width: 100%;
        height: auto;
        max-height: 200px;
        padding: 20px 0;
      }

      .menu-item {
        padding: 12px 20px;
        display: inline-block;
        margin: 5px 10px;
        border-radius: 20px;
      }

      .right-content {
        padding: 30px 20px;
      }

      .section-title {
        font-size: 20px;
      }

      .section-text {
        font-size: 15px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d48a5d;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8b4c39;
    }
  </style>
</head>

<body>
  <div id="app" class="app-container">
    <!-- 左侧菜单 -->
    <div class="left-menu">
      <div class="menu-title">藏族文化专题</div>
      <div
        class="menu-item"
        :class="{ active: currentMenu === item }"
        v-for="item in menuList"
        @click="selectMenu(item)"
      >
        {{ item }}
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="right-content" v-if="currentContent || currentCards.length > 0 || currentCarousel.length > 0">
      <div class="section">
        <div class="section-title">{{ currentMenu }}</div>
        
        <!-- 图片展示 -->
        <img v-if="currentImg && currentCarousel.length === 0" :src="currentImg" class="culture-img" alt="文化图片">
        
        <!-- 轮播图 -->
        <div v-if="currentCarousel.length > 0" class="carousel-container">
          <div class="carousel-wrapper" :style="{ transform: `translateX(-${currentIndex * 100}%)` }">
            <div v-for="(item, index) in currentCarousel" :key="index" class="carousel-item">
              <img :src="item" alt="轮播图片">
            </div>
          </div>
          <div class="carousel-controls">
            <button class="carousel-control" @click="prev">&lt;</button>
            <button class="carousel-control" @click="next">&gt;</button>
          </div>
          <div class="carousel-indicators">
            <div 
              v-for="(item, index) in currentCarousel" 
              :key="index" 
              class="carousel-indicator" 
              :class="{ active: currentIndex === index }"
              @click="goToSlide(index)"
            ></div>
          </div>
        </div>
        
        <!-- 卡片显示 -->
        <div v-if="currentCards.length > 0" class="card-container">
          <div v-for="(card, index) in currentCards" :key="index" class="card">
            <div class="card-title">{{ card.title }}</div>
            <div class="card-content">{{ card.content }}</div>
            <a v-if="card.url" :href="card.url" target="_blank" class="card-link">
              <button class="link-button">访问链接</button>
            </a>
          </div>
        </div>
        
        <!-- 普通文本显示 -->
        <div v-else class="section-text" v-for="(text, i) in currentContent" :key="i">
          {{ text }}
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          currentMenu: "日月山 ཉི་ཟླ་རི་བོ།",
          menuList: ["日月山 ཉི་ཟླ་རི་བོ།", "神山信仰 གནས་རིའི་དད་མོས།", "文化门户 རིག་གནས་སྒོ་དབྱིབས།", "历史象征 ལོ་རྒྱུས་ཀྱི་མཚོན་རྟགས།", "民俗意义 དམངས་སྲོལ་གྱི་དོན་སྙིང་།","资源状况 ཐོན་གུངས་གོན་དོན་སྙིང་།","历史文化 ལོ་རྒྱུས་རིག་གནས།","荣誉记录 མཚན་སྙན་ཟིན་ཐོ།","参考资料 དཔྱད་གཞིའི་རིག་གོས།"],
          currentContent: [],
          currentImg: "",
          currentCarousel: [],
          currentCards: [],
          currentIndex: 0
        };
      },
      mounted() {
        this.selectMenu("日月山 ཉི་ཟླ་རི་བོ།");
      },
      methods: {
        selectMenu(item) {
          this.currentMenu = item;

          const contentMap = {
            "日月山 ཉི་ཟླ་རི་བོ།": {
              img: "images/nn2.jpg",
              text: [
                "日月山是藏族文化中的重要界碑，象征文化边界与精神门户。",
                "它是安多藏区的东界起点，代表游牧文明与农耕文明的过渡地带。",
                "在藏族传统观念中，日月山承载着宇宙观、神山信仰与历史记忆。"
              ]
            },
            "神山信仰 གནས་རིའི་དད་མོས།": {
              img: "images/nn5.jpg",
              text: [
                "山在藏族文化中是神灵居所，日月山因名称与形态具有神圣性。",
                "日与月象征光明、平衡、和谐与生命秩序。",
                "民众途经此地会煨桑、挂经幡，表达敬畏之心。"
              ]
            },
            "文化门户 རིག་གནས་སྒོ་དབྱིབས།": {
              img: "images/nn3.jpg",
              text: [
                "日月山是藏文化东部门户，一过此山便进入藏区风貌。",
                "语言、服饰、建筑、习俗在此发生明显过渡。",
                "对藏族而言，跨越日月山即回到文化故土。"
              ]
            },
            "历史象征 ལོ་རྒྱུས་ཀྱི་མཚོན་རྟགས།": {
              img: "images/nn1.jpg",
              text: [
                "日月山因文成公主进藏传说，成为汉藏文化交流地标。",
                "代表文化融合、友好往来与和平使命。",
                "是民族记忆与文化认同的重要符号。"
              ]
            },
            "民俗意义 དམངས་སྲོལ་གྱི་དོན་སྙིང་།": {
              img: "images/nn4.jpg",
              text: [
                "日月山频繁出现在民间故事、歌谣、谚语中。",

              ]
            },
            "资源状况 ཐོན་གུངས་གོན་དོན་སྙིང་།": {
              img: "images/mn1.jpg",
              carousel: [
                "images/mm1.jpg",
                "images/mm2.jpg",
                "images/mm3.jpg",
                "images/mm4.jpg",
                "images/mm5.jpg",
                "images/mm6.jpg",
                "images/mm7.jpg",
              ],
              cards: [
                {
                  title: "唐蕃古道・千年丝路咽喉 ཐང་བོད་གནའ་ལམ་དང་ལོ་ངོ་སྟོང་གི་དར་གོས་ལམ་བུའི་འགག་མགོ།",
                  content: "穿过日月山坊，便是当年文成公主经日月山赴吐蕃和亲的唐蕃古道。古道旁，坐落着文成公主纪念馆与日月山神牛塑像，纪念馆内供奉着松赞干布与文成公主塑像，见证着汉藏文化交融的历史。(རི་བོ་ཉི་ཟླའི་ལམ་བུ་བརྒྱུད་ནས་སྐབས་དེའི་འུན་ཤིང་ཀོང་ཇོ་རི་བོ་ཉི་ཟླ་བརྒྱུད་བོད་དུ་གཉེན་འགྲིག་བྱེད་པར་ཕེབས་སའི་ཐང་བོད་གནའ་ལམ་དུ་སླེབས་ཡོད།གནའ་ལམ་འགྲམ་དུ་འུན་ཤིང་ཀོང་ཇོའི་དྲན་གསོ་ཁང་དང་རི་བོ་ཉི་ཟླའི་ལྷ་གླང་བརྐོས་བརྙན་ཡོད་པ་དང་།དྲན་གསོ་ཁང་ནང་སྲོང་བཙན་སྒམ་པོ་དང་འུན་ཤིང་ཀོང་ཇོའི་བརྐོས་བརྙན་བཞུགས་ཡོད་པ་དེ་ཐོག་ནས་རྒྱ་བོད་རིག་གནས་མཉམ་འདྲེས་ཀྱི་ལོ་རྒྱུས་མངོན་ཡོད་པ་རེད།)"
                },
                {
                  title: "公主泉・思乡之泪 ཀོང་ཇོ་ཆོན་སི་ཞང་གི་མིག་ཆུ།",
                  content: "进入景区，首先映入眼帘的是经幡环绕的公主泉。相传文成公主在日月山遥望故乡，因视线被群山阻隔而落泪，泪水化作清泉，便是如今的公主泉，承载着公主的思乡之情。(མཛེས་ལྗོངས་ཁུལ་དུ་སླེབས་སྐབས།ཐོག་མར་མིག་ལམ་དུ་འཆར་བ་ནི་དར་ལྕོག་གིས་བསྐོར་བའི་ཀོང་ཇོ་ཆུ་མིག་ཡིན་པ་དང་།དེ་ནི་ལོ་རྒྱུས་ལྟར་ན་འུན་ཤིང་ཀོང་ཇོས་རི་བོ་ཉི་ཟླའི་རི་སྟེང་ནས་ཕ་ཡུལ་ལ་རྒྱང་བལྟ་བྱེད་སྐབས།མིག་ལམ་དུ་རི་ཚོགས་ཀྱིས་བསྒྲིབས་པས་མཆི་མ་བཞུར་བ་དང་ཆབས་ཅིག་མིག་ཆུ་དྭངས་གཙང་ཆུ་མིག་ཏུ་གྱུར་ནས་ད་ཆའི་ཀོང་ཇོ་ཆུ་མིག་གྲུབ་པ་དང་འདྲ།དེས་འུན་ཤིང་ཀོང་ཇོའི་ཕ་ཡུལ་དྲན་པའི་བརྩེ་སེམས་མཚོན་ཡོད་པ་རེད།)"
                },
