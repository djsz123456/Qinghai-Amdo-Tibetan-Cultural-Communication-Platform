<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藏族文化专题 - 阿尼玛卿雪山</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #f7f3ee;
      color: #333;
      line-height: 1.7;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .left-menu {
      width: 280px;
      background: linear-gradient(135deg, #f9f1e9 0%, #f1e2d3 100%);
      border-right: 1px solid #e8d5c0;
      padding: 30px 0;
      overflow-y: auto;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }

    .menu-title {
      text-align: center;
      font-size: 20px;
      color: #8b4c39;
      margin-bottom: 30px;
      font-weight: bold;
      padding: 0 20px;
      position: relative;
    }

    .menu-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: #d48a5d;
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .menu-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #555;
      position: relative;
      overflow: hidden;
    }

    .menu-item:hover {
      background-color: rgba(212, 138, 93, 0.1);
      color: #8b4c39;
      transform: translateX(5px);
    }

    .menu-item.active {
      background: linear-gradient(90deg, #d48a5d 0%, #e6a87a 100%);
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #8b4c39;
    }

    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 50px 80px;
      background: #fff;
      position: relative;
    }

    .culture-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      margin: 20px 0 30px 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }

    .culture-img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .carousel-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 20px 0 30px 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease;
      height: 100%;
    }

    .carousel-item {
      flex: 0 0 100%;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }

    .carousel-control {
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .carousel-control:hover {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.1);
    }

    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .carousel-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-indicator.active {
      background: rgba(255, 255, 255, 1);
      transform: scale(1.2);
    }

    .section {
      margin-bottom: 60px;
      animation: fadeIn 0.6s ease forwards;
    }

    .section-title {
      font-size: 24px;
      color: #8b4c39;
      margin-bottom: 25px;
      padding-left: 15px;
      border-left: 5px solid #d48a5d;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #d48a5d, transparent);
      margin-left: 20px;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid #f0e6d8;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #8b4c39;
      margin-bottom: 12px;
      border-bottom: 2px solid #d48a5d;
      padding-bottom: 8px;
    }

    .card-content {
      font-size: 15px;
      color: #444;
      line-height: 1.8;
      text-align: justify;
      margin-bottom: 15px;
    }

    .card-content strong {
      color: #8b4c39;
    }

    .card-content ul {
      margin: 8px 0;
      padding-left: 20px;
    }

    .card-content ul li {
      margin: 6px 0;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
    }

    .link-button {
      background: linear-gradient(135deg, #d48a5d, #8b4c39);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(212, 138, 93, 0.3);
    }

    .link-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 138, 93, 0.5);
      background: linear-gradient(135deg, #8b4c39, #d48a5d);
    }

    .section-text {
      font-size: 16px;
      color: #444;
      margin-bottom: 15px;
      line-height: 1.8;
      text-align: justify;
      padding: 0 10px;
    }

    .section-text:last-child {
      margin-bottom: 0;
    }

    .highlight-text {
      background: linear-gradient(135deg, #fdf2e9, #fce8d5);
      padding: 20px 25px;
      border-radius: 10px;
      border-left: 4px solid #d48a5d;
      margin: 20px 0;
      font-size: 16px;
      line-height: 1.9;
      color: #5a3e2b;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .left-menu {
        width: 100%;
        height: auto;
        max-height: 200px;
        padding: 20px 0;
      }

      .menu-item {
        padding: 12px 20px;
        display: inline-block;
        margin: 5px 10px;
        border-radius: 20px;
      }

      .right-content {
        padding: 30px 20px;
      }

      .section-title {
        font-size: 20px;
      }

      .section-text {
        font-size: 15px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #d48a5d;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8b4c39;
    }
  </style>
</head>

<body>
  <div id="app" class="app-container">
    <div class="left-menu">
      <div class="menu-title">阿尼玛卿雪山</div>
      <div
        class="menu-item"
        :class="{ active: currentMenu === item.key }"
        v-for="item in menuList"
        @click="selectMenu(item.key)"
      >
        {{ item.label }}
      </div>
    </div>

    <div class="right-content" v-if="currentContent || currentCards.length > 0 || currentCarousel.length > 0">
      <div class="section">
        <div class="section-title">{{ currentMenuLabel }}</div>
        
        <img v-if="currentImg && currentCarousel.length === 0" :src="currentImg" class="culture-img" alt="文化图片">
        
        <div v-if="currentCarousel.length > 0" class="carousel-container">
          <div class="carousel-wrapper" :style="{ transform: `translateX(-${currentIndex * 100}%)` }">
            <div v-for="(item, index) in currentCarousel" :key="index" class="carousel-item">
              <img :src="item" alt="轮播图片">
            </div>
          </div>
          <div class="carousel-controls">
            <button class="carousel-control" @click="prev">&lt;</button>
            <button class="carousel-control" @click="next">&gt;</button>
          </div>
          <div class="carousel-indicators">
            <div 
              v-for="(item, index) in currentCarousel" 
              :key="index" 
              class="carousel-indicator" 
              :class="{ active: currentIndex === index }"
              @click="goToSlide(index)"
            ></div>
          </div>
        </div>
        
        <div v-if="currentHighlight" class="highlight-text" v-html="currentHighlight"></div>
        
        <div v-if="currentCards.length > 0" class="card-container">
          <div v-for="(card, index) in currentCards" :key="index" class="card">
            <div class="card-title">{{ card.title }}</div>
            <div class="card-content" v-html="card.content"></div>
          </div>
        </div>
        
        <div v-else-if="currentContent && currentContent.length > 0" class="section-text" v-for="(text, i) in currentContent" :key="i">
          {{ text }}
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          currentMenu: "overview",
          menuList: [
            { key: "overview", label: "雪山概述" },
            { key: "faith", label: "神山信仰" },
            { key: "gateway", label: "文化门户" },
            { key: "symbol", label: "历史象征" },
            { key: "customs", label: "民俗意义" },
            { key: "resources", label: "资源状况" },
            { key: "history", label: "历史文化" },
            { key: "honors", label: "荣誉记录" },
            { key: "references", label: "参考资料" }
          ],
          currentContent: [],
          currentImg: "",
          currentCarousel: [],
          currentCards: [],
          currentHighlight: "",
          currentIndex: 0
        };
      },
      computed: {
        currentMenuLabel() {
          const item = this.menuList.find(m => m.key === this.currentMenu);
          return item ? item.label : '';
        }
      },
      mounted() {
        this.selectMenu("overview");
      },
      methods: {
        selectMenu(key) {
          this.currentMenu = key;

          const contentMap = {
            "overview": {
              carousel: [
                "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=阿尼玛卿雪山，安多藏族神山，雪山全景，蓝天白云，庄严神圣，果洛玛沁县&image_size=landscape_16_9",
                "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=阿尼玛卿雪山冰川，安多藏区，雪域高原，壮美自然风光&image_size=landscape_16_9",
                "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=阿尼玛卿雪山转山，安多藏族信徒朝圣，经幡飘扬，煨桑祈福&image_size=landscape_16_9",
                "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=阿尼玛卿雪山脚下的草原，安多藏族游牧生活，牛羊成群，经幡阵&image_size=landscape_16_9",
                "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=阿尼玛卿雪山日出，金色阳光照耀雪山，安多神山，庄严壮观&image_size=landscape_16_9"
              ],
              highlight: "阿尼玛卿雪山，藏语称「<strong>阿尼玛卿</strong>」（意为「祖父大玛神之山」，安多藏语译法），位于青海省果洛藏族自治州玛沁县境内，是<strong>藏区四大神山之一</strong>，更是安多藏区公认的「<strong>安多第一神山</strong>」，是安多藏族文化、信仰与自然生态的核心符号。",
              cards: [
                {
                  title: "阿尼玛卿雪山简介",
                  content: "阿尼玛卿雪山，藏语称「阿尼玛卿」（意为「祖父大玛神之山」，安多藏语译法），位于青海省果洛藏族自治州玛沁县境内，是藏区四大神山之一，更是安多藏区公认的「安多第一神山」，是安多藏族文化、信仰与自然生态的核心符号。"
                },
                {
                  title: "文化地位",
                  content: "阿尼玛卿雪山是安多藏族信仰的精神核心，在藏传佛教与本土自然信仰中都拥有至高地位。它与西藏冈仁波齐、青海玉树尕朵觉悟、云南梅里雪山并称<strong>藏区四大神山</strong>，在安多藏族信仰中占据核心地位。"
                }
              ]
            },
            "faith": {
              highlight: "核心定位：<strong>安多藏族最核心的自然信仰圣地，藏区四大神山之一</strong>",
              cards: [
                {
                  title: "神山信仰 གནས་བརྩེ་རིའི་དངོས་གྲུབ།",
                  content: "阿尼玛卿雪山，藏语称<strong>「罗尔加冬」</strong>，是藏传佛教宁玛派、格鲁派共同尊崇的安多第一神山，与西藏冈仁波齐、青海玉树尕朵觉悟、云南梅里雪山并称<strong>藏区四大神山</strong>，在安多藏族信仰中占据核心地位。"
                },
                {
                  title: "保护神山",
                  content: "作为安多藏族的<strong>「保护神山」</strong>，阿尼玛卿被视为部落保护神、草原守护神，千百年来，安多藏族牧民、信徒始终以「转山、祈福、朝圣」为核心信仰，将其视为护佑一方平安、风调雨顺的精神象征。"
                },
                {
                  title: "信仰核心",
                  content: "阿尼玛卿是安多游牧文化与自然信仰结合的极致体现，是安多藏族精神世界的最高象征。"
                }
              ]
            },
            "gateway": {
              highlight: "核心定位：<strong>安多藏区与黄河上游的文化交汇节点</strong>",
              cards: [
                {
                  title: "文化门户 རིག་གནས་ས་གནས་སྒོ་འབྱེད་ག།",
                  content: "阿尼玛卿雪山位于青海果洛州玛沁县，是安多藏区通往<strong>黄河源头</strong>的文化门户，也是果洛格萨尔文化、安多游牧文化、藏传佛教文化的交汇核心。"
                },
                {
                  title: "地理文化意义",
                  content: "从地理文化看，它既是<strong>黄河上游的天然屏障</strong>，也是安多藏族从草原向河谷地带迁徙的文化节点。"
                },
                {
                  title: "民俗文化交汇",
                  content: "从民俗文化看，它连接了<strong>果洛格萨尔王传说</strong>、<strong>安多转山习俗</strong>、<strong>藏传佛教护法文化</strong>，是解读安多文化「自然 - 信仰 - 民俗」三位一体的关键入口。"

                {
                  title: "部落联盟象征",

                },
                {
                  title: "黄河文化象征",
                  content: "它是<strong>黄河源头</strong>的重要地标，象征「中华水塔」的生态守护，也是安多藏族与中原文化共生的历史纽带。"
                },
                {
                  title: "格萨尔文化象征",
                  content: "阿尼玛卿雪山在《<strong>格萨尔王传</strong>》中多次出现，是格萨尔王征战、护法的重要圣地，承载着安多藏族的英雄文化记忆。"
                }
              ]
            },
            "customs": {
              highlight: "核心定位：<strong>安多藏族核心民俗活动的载体</strong>",
              cards: [
                {
                  title: "民俗意义 དམིགས་བསམ་སྲོག་གི་དོན་གྱི་སྙིང་སྟོབས།",
                  content: "阿尼玛卿雪山是安多藏族民俗文化的核心实践地，民俗意义贯穿一生。"

                },
                {
                  title: "✅ 祭祀民俗",
                  content: "每年藏历五月、十月，安多牧民会前往神山脚下举行「<strong>祭山</strong>」仪式，祈求草原水草丰美、牛羊兴旺，是安多藏族自然崇拜的核心实践。"
                },
                {
                  title: "✅ 英雄民俗",
                  content: "与<strong>格萨尔王传说</strong>结合，衍生出「神山祈福、英雄朝圣」等独特民俗，成为安多藏族文化传承的重要纽带。"
                }
              ]
            },
            "resources": {
              highlight: "核心定位：<strong>自然生态与文化资源的双重价值</strong>",
              cards: [
                {
                  title: "资源状况 ཐོན་སྐེས་གསུང་གི་དོན་གྱི་སྙིང་སྟོབས།",
                  content: "阿尼玛卿雪山兼具极高的<strong>自然生态价值</strong>与<strong>文化资源价值</strong>，是安多地区的资源核心。"
                },
                {
                  title: "自然生态资源",

                },
                {
                  title: "文化资源价值",
                  content: "拥有完整的安多藏传佛教文化遗存、<strong>格萨尔文化遗址</strong>、传统游牧民俗资源，是「安多文化数字化传播」的重要核心素材。"
                }
              ]
            },
            "history": {
              highlight: "核心定位：<strong>安多藏族历史文化的千年积淀</strong>",
              cards: [
